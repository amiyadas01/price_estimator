{% extends 'core/base.html' %} {% block content %}
<div
  class="row justify-content-center align-items-center"
  style="min-height: 65vh"
>
  <div class="col-md-10 col-lg-7 text-center">
    <div
      class="d-inline-flex align-items-center gap-2 px-3 py-1 rounded-pill mb-4"
      style="
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid rgba(59, 130, 246, 0.2);
      "
    >
      <span class="text-primary small fw-bold">v3.0 RELEASE</span>
      <span class="text-white-50 small">Now with Deep-JSON Scraping</span>
    </div>

    <h1 class="display-2 fw-black mb-3" style="line-height: 1.1">
      Compare Prices. <br /><span class="text-primary">Master the Market.</span>
    </h1>

    <p class="lead text-muted mb-5 px-md-5">
      The only tool you need to track prices across Amazon, Flipkart, IndiaMART,
      and more. Instant. Reliable. Transparent.
    </p>

    <form
      action="{% url 'search' %}"
      method="GET"
      class="search-premium p-1 rounded-pill mb-5"
    >
      <div class="input-group align-items-center">
        <div class="ps-4 text-muted d-none d-sm-block">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            fill="currentColor"
            class="bi bi-search"
            viewBox="0 0 16 16"
          >
            <path
              d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"
            />
          </svg>
        </div>
        <input
          type="text"
          name="q"
          class="form-control border-0 bg-transparent text-white ps-3 py-4 fs-4"
          placeholder="What are you buying today?"
          required
          autofocus
          id="searchInput"
        />
        <button
          class="btn btn-primary rounded-pill px-5 py-3 me-1 my-1 fw-bold d-flex align-items-center gap-2"
          type="submit"
        >
          Search
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="currentColor"
            class="bi bi-chevron-right"
            viewBox="0 0 16 16"
          >
            <path
              fill-rule="evenodd"
              d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"
            />
          </svg>
        </button>
      </div>
    </form>

    <div
      class="d-flex flex-wrap justify-content-center gap-4 opacity-50 grayscale"
    >
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg"
        height="20"
        alt="Amazon"
      />
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/1/18/Flipkart_logo.svg"
        height="20"
        alt="Flipkart"
      />
      <span class="text-white fw-bold small tracking-widest">INDIAMART</span>
      <span class="text-white fw-bold small tracking-widest">SNAPDEAL</span>
    </div>
  </div>
</div>

<style>
  .fw-black {
    font-weight: 900;
  }
  .search-premium {
    background: #121212;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
  }
  .search-premium:focus-within {
    border-color: var(--primary);
    background: #18181b;
    box-shadow: 0 0 0 4px var(--primary-glow);
  }
  .form-control:focus {
    outline: none;
    box-shadow: none;
  }
  .grayscale {
    filter: grayscale(1) brightness(2);
  }
  .extra-small {
    font-size: 0.7rem;
  }
</style>
{% endblock %}
